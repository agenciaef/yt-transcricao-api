version: "3.7"

services:

  youtube-transcricao-api:
    image: ghcr.io/agenciaef/yt-transcricao-api:latest

    networks:
      - TuaAgenciaNet

    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=America/Sao_Paulo
      - API_TOKEN=glCqYQD5mDcpMTn6lvf0CkE3tNbWbul4

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=TuaAgenciaNet
        - traefik.http.routers.youtube-transcricao-api.rule=Host(`apiyttranscription.tuagencia.com.br`)
        - traefik.http.routers.youtube-transcricao-api.entrypoints=websecure
        - traefik.http.routers.youtube-transcricao-api.tls=true
        - traefik.http.routers.youtube-transcricao-api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.youtube-transcricao-api.service=youtube-transcricao-api
        - traefik.http.services.youtube-transcricao-api.loadbalancer.server.port=3000

networks:
  TuaAgenciaNet:
    external: true
    name: TuaAgenciaNet
